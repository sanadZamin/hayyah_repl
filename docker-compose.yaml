services:
  api:
    image: altshiftcreative/hayyah-api:1.0.0
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      KEYCLOAK_CLIENT_SECRET: Vd8dMXpixGDMxFi0JJDoB0l3Pb7ThnLN
      DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
      PORT: 8080

  web:
    image: altshiftcreative/hayyah-web:1.0.0
    build:
      context: .
      dockerfile: Dockerfile.web
      # VITE_* here are BUILD ARGS only — baked into JS during `docker compose build`.
      # They are NOT read at container runtime (final image is nginx + static files).
      # Set VITE_CLIENT_SECRET in a `.env` next to this file when building locally.
      args:
        VITE_CLIENT_SECRET: ${VITE_CLIENT_SECRET}
        VITE_AUTH_TOKEN_URL: ${VITE_AUTH_TOKEN_URL}
        VITE_AUTH_BASE_URL: ${VITE_AUTH_BASE_URL}
        VITE_AUTH_REFRESH_URL: ${VITE_AUTH_REFRESH_URL}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    ports:
      - "80:80"
    environment:
      API_UPSTREAM: ${API_UPSTREAM:-https://hayyah.me}