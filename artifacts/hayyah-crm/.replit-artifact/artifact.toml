kind = "web"
previewPath = "/"
title = "Hayyah CRM"
version = "1.0.0"
id = "artifacts/hayyah-crm"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20746
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/hayyah-crm run dev"

[services.env]
PORT = "20746"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/hayyah-crm", "run", "build"]
publicDir = "artifacts/hayyah-crm/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
