server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Backward-compatible auth route for older frontend bundles that still call /api/auth/token.
    location = /api/auth/token {
        proxy_pass https://hayyah.me/auth/realms/hayyah/protocol/openid-connect/token;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        proxy_pass ${API_UPSTREAM}/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Frontend bundle is built with base "/frontend/" so requests come in as
    # /frontend/assets/*.js. Strip that prefix before resolving files on disk.
    location /frontend/ {
        rewrite ^/frontend/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
