server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # CRM login — proxy to API auth route (server injects Keycloak client_secret), not straight to Keycloak.
    location = /api/auth/token {
        proxy_pass ${API_UPSTREAM}/api/auth/token;
        proxy_set_header Host hayyah.me;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Optional: relative VITE_AUTH_TOKEN_URL=/auth/realms/... in dev-style builds
    location /auth/ {
        proxy_pass ${API_UPSTREAM}/auth/;
        proxy_set_header Host hayyah.me;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/ {
        proxy_pass ${API_UPSTREAM}/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Frontend bundle is built with base "/frontend/" so requests come in as
    # /frontend/assets/*.js. Strip that prefix before resolving files on disk.
    location /frontend/ {
        rewrite ^/frontend/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
