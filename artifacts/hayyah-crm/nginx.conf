server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https://hayyah.me; img-src 'self' data: blob:;" always;

    location /frontend/api/ {
        proxy_pass http://api:8180/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /frontend/ {
        try_files $uri $uri/ /frontend/index.html;
    }

    location = / {
        return 301 /frontend/;
    }
}
